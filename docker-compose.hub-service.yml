# Local dev / self-hosted deployment for the hub service (apra-fleet-us9.4).
# Usage: docker compose -f docker-compose.hub-service.yml up
#
# For production, point HUB_DATABASE_URL at your own managed Postgres
# instead of the bundled `db` service, and set a real HUB_JWT_SECRET
# (this file's default is for local dev only -- never use it in production).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hub
      POSTGRES_PASSWORD: hub-dev-password
      POSTGRES_DB: apra_fleet_hub
    ports:
      - "5432:5432"
    volumes:
      - hub-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hub"]
      interval: 5s
      timeout: 5s
      retries: 10

  hub-service:
    build:
      context: .
      dockerfile: Dockerfile.hub-service
    ports:
      - "8080:8080"
    environment:
      HUB_DATABASE_URL: postgres://hub:hub-dev-password@db:5432/apra_fleet_hub
      HUB_JWT_SECRET: local-dev-secret-do-not-use-in-production
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  hub-db-data:
