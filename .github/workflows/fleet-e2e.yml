name: Fleet E2E Test Suite
run-name: Fleet E2E Test Suite ${{ inputs.suite }} - ${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run. s1.1/s1.2/s1.3 = local-only variants; s7.1/s7.2/s7.3 = all-Gemini.'
        required: true
        type: choice
        options: [s1, s1.1, s1.2, s1.3, s2, s3, s4, s5, s6, s7.1, s7.2, s7.3]

jobs:
  e2e:
    name: 'Fleet E2E - ${{ inputs.suite }}'
    env:
      GEMINI_CLI_TRUST_WORKSPACE: "true"
    runs-on:
      - self-hosted
      - ${{ inputs.suite == 's1'   && 'fleet-windows'
         || inputs.suite == 's1.1' && 'fleet-windows'
         || inputs.suite == 's1.2' && 'fleet-linux'
         || inputs.suite == 's1.3' && 'fleet-macos'
         || inputs.suite == 's2'   && 'fleet-linux'
         || inputs.suite == 's3'   && 'fleet-macos'
         || inputs.suite == 's4'   && 'fleet-windows'
         || inputs.suite == 's5'   && 'fleet-linux'
         || inputs.suite == 's7.1' && 'fleet-windows'
         || inputs.suite == 's7.2' && 'fleet-linux'
         || inputs.suite == 's7.3' && 'fleet-macos'
         || 'fleet-macos' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create run directory
        shell: bash
        run: |
          RUN_DIR="$(dirname "$GITHUB_WORKSPACE")/testRuns/${{ github.run_id }}-${{ github.run_attempt }}"
          mkdir -p "$RUN_DIR/logs"
          echo "RUN_DIR=$RUN_DIR" >> "$GITHUB_ENV"
          echo "Run directory: $RUN_DIR"

      - name: Check runner prerequisites
        shell: bash
        run: |
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          jq --version || { echo "::error::jq is not installed on this runner"; exit 1; }

      - name: Load suite config
        id: suite
        shell: bash
        run: |
          SUITE='${{ inputs.suite }}'
          CONFIG=$(cat .github/e2e/suites.json)
          MEMBERS=$(cat .github/e2e/members.json)

          PM_PROVIDER=$(echo $CONFIG | jq -r ".suites[\"$SUITE\"].pm.provider")
          PM_OS=$(echo $CONFIG      | jq -r ".suites[\"$SUITE\"].pm.os")
          DOER_OS=$(echo $CONFIG    | jq -r ".suites[\"$SUITE\"].doer.os")
          DOER_PROV=$(echo $CONFIG  | jq -r ".suites[\"$SUITE\"].doer.provider")
          REV_OS=$(echo $CONFIG     | jq -r ".suites[\"$SUITE\"].reviewer.os")
          REV_PROV=$(echo $CONFIG   | jq -r ".suites[\"$SUITE\"].reviewer.provider")
          VCS=$(echo $CONFIG        | jq -r ".suites[\"$SUITE\"].vcs")

          DOER_HOST=$(echo $MEMBERS   | jq -r ".$DOER_OS.host")
          DOER_USER=$(echo $MEMBERS   | jq -r ".$DOER_OS.username // empty")
          DOER_FOLDER=$(echo $MEMBERS | jq -r ".$DOER_OS.work_folder")
          REV_HOST=$(echo $MEMBERS    | jq -r ".$REV_OS.host")
          REV_USER=$(echo $MEMBERS    | jq -r ".$REV_OS.username  // empty")
          REV_FOLDER=$(echo $MEMBERS  | jq -r ".$REV_OS.work_folder")
          TOY_URL=$(echo $MEMBERS     | jq -r ".toy_projects.$VCS")

          echo "pm_provider=$PM_PROVIDER"   >> $GITHUB_OUTPUT
          echo "pm_os=$PM_OS"               >> $GITHUB_OUTPUT
          echo "doer_os=$DOER_OS"           >> $GITHUB_OUTPUT
          echo "doer_provider=$DOER_PROV"   >> $GITHUB_OUTPUT
          echo "doer_host=$DOER_HOST"       >> $GITHUB_OUTPUT
          echo "doer_user=$DOER_USER"       >> $GITHUB_OUTPUT
          echo "doer_folder=$DOER_FOLDER"   >> $GITHUB_OUTPUT
          echo "reviewer_os=$REV_OS"        >> $GITHUB_OUTPUT
          echo "reviewer_provider=$REV_PROV" >> $GITHUB_OUTPUT
          echo "reviewer_host=$REV_HOST"    >> $GITHUB_OUTPUT
          echo "reviewer_user=$REV_USER"    >> $GITHUB_OUTPUT
          echo "reviewer_folder=$REV_FOLDER" >> $GITHUB_OUTPUT
          echo "vcs=$VCS"                   >> $GITHUB_OUTPUT
          echo "toy_url=$TOY_URL"           >> $GITHUB_OUTPUT

      - name: Build and install fleet binary on PM
        shell: bash
        run: |
          npm ci
          npm run build:binary
          if [ "$RUNNER_OS" = "Windows" ]; then
            BIN=$(ls dist/apra-fleet-installer-*.exe | head -1)
          else
            BIN=$(ls dist/apra-fleet-installer-* | grep -v -E '\.(blob|cjs|json|exe)$' | head -1)
          fi
          chmod +x "$BIN" 2>/dev/null || true
          "$BIN" install --force --llm ${{ steps.suite.outputs.pm_provider }}
          if [ "$RUNNER_OS" = "Windows" ]; then
            INSTALLED_BIN="$HOME/.apra-fleet/bin/apra-fleet.exe"
          else
            INSTALLED_BIN="$HOME/.apra-fleet/bin/apra-fleet"
          fi
          "$INSTALLED_BIN" --version

      - name: Seed fleet credential store
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            FLEET_BIN="$HOME/.apra-fleet/bin/apra-fleet.exe"
          else
            FLEET_BIN="$HOME/.apra-fleet/bin/apra-fleet"
          fi
          echo "$E2E_BB_TOKEN"    | "$FLEET_BIN" secret --set e2e_bb_token    --persist -y
          echo "$E2E_BB_USER"     | "$FLEET_BIN" secret --set e2e_bb_user     --persist -y
          echo "$E2E_GH_TOKEN"    | "$FLEET_BIN" secret --set e2e_gh_token    --persist -y
          echo "$E2E_ADO_TOKEN"   | "$FLEET_BIN" secret --set e2e_ado_token   --persist -y
          echo "$E2E_ACRED"       | "$FLEET_BIN" secret --set E2E_ACRED       --persist -y
        env:
          E2E_BB_TOKEN:   ${{ secrets.E2E_BB_TOKEN }}
          E2E_BB_USER:    ${{ secrets.E2E_BB_USER }}
          E2E_GH_TOKEN:   ${{ secrets.E2E_GH_TOKEN }}
          E2E_ADO_TOKEN:  ${{ secrets.E2E_ADO_TOKEN }}
          E2E_ACRED:      ${{ secrets.E2E_ACRED }}

      - name: Prepare clean PM environment
        shell: bash
        run: |
          dir="$GITHUB_WORKSPACE"
          while [ "$(dirname "$dir")" != "$dir" ]; do
            dir="$(dirname "$dir")"
            [ -f "$dir/.claude/settings.local.json" ] && rm -v "$dir/.claude/settings.local.json"
            [ -f "$dir/.gemini/settings.json" ] && rm -v "$dir/.gemini/settings.json"
          done
          echo "Done."

      - name: Smoke-test PM LLM auth and fleet MCP
        shell: bash
        run: |
          cd "$RUN_DIR"
          PROMPT="What is the version of the apra-fleet MCP server installed? If the tool is not available reply with: not installed. Also print names of your custom skills separated by comma."
          PROVIDER='${{ steps.suite.outputs.pm_provider }}'
          if [ "$PROVIDER" = "claude" ]; then
            output=$(claude -p "$PROMPT" --model haiku 2>&1)
            echo "$output"
            echo "PM claude auth OK"
          elif [ "$PROVIDER" = "gemini" ]; then
            output=$(gemini -p "$PROMPT" --model auto --skip-trust 2>&1)
            echo "$output"
            echo "PM gemini auth OK"
          fi

      - name: Purge fleet daemon logs
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            LOG_DIR="$(cygpath "$USERPROFILE")/.apra-fleet/data/logs"
          else
            LOG_DIR="$HOME/.apra-fleet/data/logs"
          fi
          rm -f "$LOG_DIR"/fleet-*.log
          echo "Fleet logs purged"

      - name: Pre-create local member work folders
        shell: bash
        run: |
          DOER_HOST='${{ steps.suite.outputs.doer_host }}'
          DOER_FOLDER='${{ steps.suite.outputs.doer_folder }}'
          REV_HOST='${{ steps.suite.outputs.reviewer_host }}'
          REV_FOLDER='${{ steps.suite.outputs.reviewer_folder }}'
          if [ "$DOER_HOST" = "local" ]; then
            mkdir -p "$DOER_FOLDER"
          fi
          if [ "$REV_HOST" = "local" ]; then
            mkdir -p "$REV_FOLDER"
          fi

      - name: Render test script
        shell: bash
        run: |
          DOER_FOLDER='${{ steps.suite.outputs.doer_folder }}'
          REVIEWER_FOLDER='${{ steps.suite.outputs.reviewer_folder }}'
          DOER_FOLDER_SED="${DOER_FOLDER//\\/\\\\}"
          REVIEWER_FOLDER_SED="${REVIEWER_FOLDER//\\/\\\\}"

          sed \
            -e 's|{{SUITE_ID}}|${{ inputs.suite }}|g' \
            -e 's|{{PM_OS}}|${{ steps.suite.outputs.pm_os }}|g' \
            -e 's|{{PM_PROVIDER}}|${{ steps.suite.outputs.pm_provider }}|g' \
            -e 's|{{DOER_HOST}}|${{ steps.suite.outputs.doer_host }}|g' \
            -e 's|{{DOER_USER}}|${{ steps.suite.outputs.doer_user }}|g' \
            -e 's|{{DOER_OS}}|${{ steps.suite.outputs.doer_os }}|g' \
            -e 's|{{DOER_PROVIDER}}|${{ steps.suite.outputs.doer_provider }}|g' \
            -e 's|{{REVIEWER_HOST}}|${{ steps.suite.outputs.reviewer_host }}|g' \
            -e 's|{{REVIEWER_USER}}|${{ steps.suite.outputs.reviewer_user }}|g' \
            -e 's|{{REVIEWER_OS}}|${{ steps.suite.outputs.reviewer_os }}|g' \
            -e 's|{{REVIEWER_PROVIDER}}|${{ steps.suite.outputs.reviewer_provider }}|g' \
            -e 's|{{TOY_PROJECT_URL}}|${{ steps.suite.outputs.toy_url }}|g' \
            -e 's|{{VCS}}|${{ steps.suite.outputs.vcs }}|g' \
            -e 's|{{BRANCH_PREFIX}}|e2e-${{ inputs.suite }}-${{ github.run_id }}|g' \
            -e "s|{{DOER_FOLDER}}|${DOER_FOLDER_SED}|g" \
            -e "s|{{REVIEWER_FOLDER}}|${REVIEWER_FOLDER_SED}|g" \
            .github/e2e/test-script.md > "$RUN_DIR/rendered-test-script.md"

      - name: Run fleet e2e (${{ steps.suite.outputs.pm_provider }})
        id: e2e
        timeout-minutes: 120
        shell: bash
        run: |
          PROVIDER='${{ steps.suite.outputs.pm_provider }}'
          cd "$RUN_DIR"
          if [ "$PROVIDER" = "claude" ]; then
            claude \
              -p "$(cat "$RUN_DIR/rendered-test-script.md")" \
              --output-format stream-json \
              --max-turns 80 \
              --add-dir "$RUN_DIR" \
              > "$RUN_DIR/raw-output.txt" 2>&1 || true
          else
            gemini --skip-trust \
              --output-format stream-json \
              -p "$(cat "$RUN_DIR/rendered-test-script.md")" \
              > "$RUN_DIR/raw-output.txt" 2>&1 || true
          fi

          # Extract PM session ID
          SESSION_ID=$(grep -m1 '"type":"system"' "$RUN_DIR/raw-output.txt" \
            | jq -r '.session_id // ""' 2>/dev/null || true)
          echo "session_id=$SESSION_ID" >> "$GITHUB_OUTPUT"

          # Assemble results.json
          node "$GITHUB_WORKSPACE/.github/e2e/extract-results.mjs" "$RUN_DIR/raw-output.txt" \
            '${{ inputs.suite }}' \
            '${{ steps.suite.outputs.pm_os }}' \
            '${{ steps.suite.outputs.pm_provider }}' \
            > "$RUN_DIR/results.json" \
            || echo '{"overall":"FAIL"}' > "$RUN_DIR/results.json"

      - name: Collect fleet daemon logs
        if: always()
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            LOG_DIR="$(cygpath "$USERPROFILE")/.apra-fleet/data/logs"
          else
            LOG_DIR="$HOME/.apra-fleet/data/logs"
          fi
          cat "$LOG_DIR"/fleet-*.log > "$RUN_DIR/logs/fleet-pm.log" 2>/dev/null || true

      - name: Extract telemetry
        if: always()
        shell: bash
        run: |
          [ -n "$RUN_DIR" ] && cd "$RUN_DIR" || exit 1
          node "$GITHUB_WORKSPACE/.github/e2e/extract-results.mjs" "raw-output.txt" \
            '${{ inputs.suite }}' \
            '${{ steps.suite.outputs.pm_os }}' \
            '${{ steps.suite.outputs.pm_provider }}' \
            > results.json

      - name: Validate e2e test completion
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH_PREFIX="e2e-${{ inputs.suite }}-${{ github.run_id }}"
          TOY_URL='${{ steps.suite.outputs.toy_url }}'
          FAIL=0
          OVERALL=$(jq -r '.overall // "MISSING"' "$RUN_DIR/results.json" 2>/dev/null || echo "MISSING")
          [ "$OVERALL" = "PASS" ] || FAIL=1
          [ "$FAIL" -eq 0 ] || exit 1

      - name: Post job summary
        if: always()
        shell: bash
        run: |
          [ -n "$RUN_DIR" ] && cd "$RUN_DIR" || exit 1
          node "$GITHUB_WORKSPACE/.github/e2e/post-summary.mjs"
        env:
          SUITE: ${{ inputs.suite }}

      - name: T6 - Teardown
        if: always()
        timeout-minutes: 5
        shell: bash
        run: |
          PROVIDER='${{ steps.suite.outputs.pm_provider }}'
          if [ "$PROVIDER" = "claude" ]; then
            claude -p "$(cat "$GITHUB_WORKSPACE/.github/e2e/t6-teardown.md")" --model haiku > "$RUN_DIR/t6-output.txt" 2>&1 || true
          else
            gemini --skip-trust -p "$(cat "$GITHUB_WORKSPACE/.github/e2e/t6-teardown.md")" > "$RUN_DIR/t6-output.txt" 2>&1 || true
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-${{ inputs.suite }}-${{ github.run_id }}
          path: ${{ env.RUN_DIR }}
