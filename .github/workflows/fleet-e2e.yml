name: Fleet E2E Test Suite

on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run (s1-s6). Start with s1 to validate setup.'
        required: true
        type: choice
        options: [s1, s2, s3, s4, s5, s6]

jobs:
  e2e:
    name: 'Fleet E2E – ${{ inputs.suite }}'
    # Force IPv4-first DNS resolution for all Node.js processes in this job.
    # api.anthropic.com has an AAAA record but IPv6 routing is broken on the
    # self-hosted runners; Node 17+ prefers IPv6 by default which causes
    # ECONNRESET on every first attempt. ipv4first eliminates that.
    env:
      NODE_OPTIONS: --dns-result-order=ipv4first
      # Increase API retry ceiling from 10 to 20 — helps on connections that
      # need multiple attempts before succeeding (e.g. Defender NIS warmup).
      # If this env var is unrecognised by claude it is silently ignored.
      CLAUDE_CODE_MAX_RETRIES: "20"
    # Runner label is derived from suites.json pm.runner field.
    # Each self-hosted runner must be registered with label fleet-windows / fleet-linux / fleet-macos.
    runs-on:
      - self-hosted
      - ${{ inputs.suite == 's1' && 'fleet-windows' || inputs.suite == 's2' && 'fleet-linux' || inputs.suite == 's3' && 'fleet-macos' || inputs.suite == 's4' && 'fleet-windows' || inputs.suite == 's5' && 'fleet-linux' || 'fleet-macos' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Step 1: Load suite config ──────────────────────────────────────────
      - name: Load suite config
        id: suite
        shell: bash
        run: |
          SUITE='${{ inputs.suite }}'
          CONFIG=$(cat .github/e2e/suites.json)
          MEMBERS=$(cat .github/e2e/members.json)

          PM_PROVIDER=$(echo $CONFIG | jq -r ".suites.$SUITE.pm.provider")
          PM_OS=$(echo $CONFIG      | jq -r ".suites.$SUITE.pm.os")
          DOER_OS=$(echo $CONFIG    | jq -r ".suites.$SUITE.doer.os")
          DOER_PROV=$(echo $CONFIG  | jq -r ".suites.$SUITE.doer.provider")
          REV_OS=$(echo $CONFIG     | jq -r ".suites.$SUITE.reviewer.os")
          REV_PROV=$(echo $CONFIG   | jq -r ".suites.$SUITE.reviewer.provider")
          VCS=$(echo $CONFIG        | jq -r ".suites.$SUITE.vcs")

          DOER_HOST=$(echo $MEMBERS   | jq -r ".$DOER_OS.host")
          DOER_USER=$(echo $MEMBERS   | jq -r ".$DOER_OS.username")
          DOER_FOLDER=$(echo $MEMBERS | jq -r ".$DOER_OS.work_folder")
          REV_HOST=$(echo $MEMBERS    | jq -r ".$REV_OS.host")
          REV_USER=$(echo $MEMBERS    | jq -r ".$REV_OS.username")
          REV_FOLDER=$(echo $MEMBERS  | jq -r ".$REV_OS.work_folder")
          TOY_URL=$(echo $MEMBERS     | jq -r ".toy_projects.$VCS")

          echo "pm_provider=$PM_PROVIDER"   >> $GITHUB_OUTPUT
          echo "pm_os=$PM_OS"               >> $GITHUB_OUTPUT
          echo "doer_os=$DOER_OS"           >> $GITHUB_OUTPUT
          echo "doer_provider=$DOER_PROV"   >> $GITHUB_OUTPUT
          echo "doer_host=$DOER_HOST"       >> $GITHUB_OUTPUT
          echo "doer_user=$DOER_USER"       >> $GITHUB_OUTPUT
          echo "doer_folder=$DOER_FOLDER"   >> $GITHUB_OUTPUT
          echo "reviewer_os=$REV_OS"        >> $GITHUB_OUTPUT
          echo "reviewer_provider=$REV_PROV" >> $GITHUB_OUTPUT
          echo "reviewer_host=$REV_HOST"    >> $GITHUB_OUTPUT
          echo "reviewer_user=$REV_USER"    >> $GITHUB_OUTPUT
          echo "reviewer_folder=$REV_FOLDER" >> $GITHUB_OUTPUT
          echo "vcs=$VCS"                   >> $GITHUB_OUTPUT
          echo "toy_url=$TOY_URL"           >> $GITHUB_OUTPUT

      # ── Step 2: Build and install fleet binary on PM runner ───────────────
      # Must come before credential seeding — seed step needs fleet on PATH.
      # Build from source so all three platforms (Windows/Linux/macOS x86_64)
      # work without any artifact download.
      - name: Build and install fleet binary on PM
        shell: bash
        run: |
          npm ci
          npm run build:binary
          if [ "$RUNNER_OS" = "Windows" ]; then
            BIN=$(ls dist/apra-fleet-installer-*.exe | head -1)
          else
            BIN=$(ls dist/apra-fleet-installer-* | grep -v -E '\.(blob|cjs|json|exe)$' | head -1)
          fi
          chmod +x "$BIN" 2>/dev/null || true
          "$BIN" install --force
          if [ "$RUNNER_OS" = "Windows" ]; then
            INSTALLED_BIN="$HOME/.apra-fleet/bin/apra-fleet.exe"
          else
            INSTALLED_BIN="$HOME/.apra-fleet/bin/apra-fleet"
          fi
          "$INSTALLED_BIN" --version

      # ── Step 3: Seed fleet credential store ───────────────────────────────
      - name: Seed fleet credential store
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            FLEET_BIN="$HOME/.apra-fleet/bin/apra-fleet.exe"
          else
            FLEET_BIN="$HOME/.apra-fleet/bin/apra-fleet"
          fi
          echo "$E2E_BB_TOKEN"    | "$FLEET_BIN" secret --set e2e_bb_token    --persist -y
          echo "$E2E_BB_USER"     | "$FLEET_BIN" secret --set e2e_bb_user     --persist -y
          echo "$E2E_GH_TOKEN"    | "$FLEET_BIN" secret --set e2e_gh_token    --persist -y
          echo "$E2E_ADO_TOKEN"   | "$FLEET_BIN" secret --set e2e_ado_token   --persist -y
        env:
          E2E_BB_TOKEN:   ${{ secrets.E2E_BB_TOKEN }}
          E2E_BB_USER:    ${{ secrets.E2E_BB_USER }}
          E2E_GH_TOKEN:   ${{ secrets.E2E_GH_TOKEN }}
          E2E_ADO_TOKEN:  ${{ secrets.E2E_ADO_TOKEN }}


      # ── Step 4: Render test script with suite context ─────────────────────
      - name: Render test script
        shell: bash
        run: |
          sed \
            -e 's|{{SUITE_ID}}|${{ inputs.suite }}|g' \
            -e 's|{{PM_OS}}|${{ steps.suite.outputs.pm_os }}|g' \
            -e 's|{{PM_PROVIDER}}|${{ steps.suite.outputs.pm_provider }}|g' \
            -e 's|{{DOER_HOST}}|${{ steps.suite.outputs.doer_host }}|g' \
            -e 's|{{DOER_OS}}|${{ steps.suite.outputs.doer_os }}|g' \
            -e 's|{{DOER_PROVIDER}}|${{ steps.suite.outputs.doer_provider }}|g' \
            -e 's|{{REVIEWER_HOST}}|${{ steps.suite.outputs.reviewer_host }}|g' \
            -e 's|{{REVIEWER_OS}}|${{ steps.suite.outputs.reviewer_os }}|g' \
            -e 's|{{REVIEWER_PROVIDER}}|${{ steps.suite.outputs.reviewer_provider }}|g' \
            -e 's|{{TOY_PROJECT_URL}}|${{ steps.suite.outputs.toy_url }}|g' \
            -e 's|{{VCS}}|${{ steps.suite.outputs.vcs }}|g' \
            -e 's|{{BRANCH_PREFIX}}|e2e-${{ inputs.suite }}-${{ github.run_id }}|g' \
            -e 's|{{DOER_FOLDER}}|${{ steps.suite.outputs.doer_folder }}|g' \
            -e 's|{{REVIEWER_FOLDER}}|${{ steps.suite.outputs.reviewer_folder }}|g' \
            .github/e2e/test-script.md > rendered-test-script.md

      # ── Step 5: Run the LLM-driven test ───────────────────────────────────
      - name: Run fleet e2e (${{ steps.suite.outputs.pm_provider }})
        shell: bash
        run: |
          # Resolve fleet binary path and write a runtime mcp config with the
          # full path — avoids PATH lookup failures in claude's subprocess env.
          if [ "$RUNNER_OS" = "Windows" ]; then
            FLEET_BIN="$HOME/.apra-fleet/bin/apra-fleet.exe"
            FLEET_BIN_WIN=$(cygpath -w "$FLEET_BIN")
            FLEET_BIN_JSON=$(echo "$FLEET_BIN_WIN" | sed 's/\\/\\\\/g')
          else
            FLEET_BIN="$HOME/.apra-fleet/bin/apra-fleet"
            FLEET_BIN_JSON="$FLEET_BIN"
          fi
          printf '{"mcpServers":{"apra-fleet":{"type":"stdio","command":"%s","args":[]}}}\n' "$FLEET_BIN_JSON" > mcp-runtime.json
          cat mcp-runtime.json

          PROVIDER='${{ steps.suite.outputs.pm_provider }}'
          if [ "$PROVIDER" = "claude" ]; then
            claude \
              -p "$(cat rendered-test-script.md)" \
              --mcp-config mcp-runtime.json \
              --output-format stream-json \
              --verbose \
              --max-turns 80 \
              > raw-output.txt 2>&1
          else
            gemini \
              --output-format stream-json \
              --mcp-config mcp-runtime.json \
              -p "$(cat rendered-test-script.md)" \
              > raw-output.txt 2>&1
          fi

          # stream-json emits one JSON object per line; the final {type:result,...}
          # contains the test verdict in the assistant's last message text.
          grep -E '"type":"result"' raw-output.txt | tail -1 \
            | jq -c '. | {result: (.result // .text // .response // ""), error: (.is_error // false), terminal_reason: (.terminal_reason // "unknown")}' \
            > results-meta.json 2>/dev/null \
            || echo '{"result":"","error":true,"terminal_reason":"no_result_line"}' > results-meta.json
          # The actual test result JSON is embedded inside the assistant's final message text.
          # Extract the first {...} block from results-meta.json's "result" field.
          jq -r '.result' results-meta.json | grep -oE '\{[^{}]*"overall"[^{}]*\}' | tail -1 > results.json \
            || echo '{"overall":"FAIL","error":"no JSON in stream-json final message"}' > results.json

          # Fallback: reconstruct from CHECKPOINT lines if final JSON is missing or lacks results
          if ! jq -e '.results' results.json > /dev/null 2>&1; then
            LAST_CHECKPOINT=$(jq -rR 'fromjson? | select(.type == "content_block_delta") | .delta.text // ""' raw-output.txt 2>/dev/null \
              | grep '^CHECKPOINT: ' | tail -1 | sed 's/^CHECKPOINT: //' || echo '')
            if [ -n "$LAST_CHECKPOINT" ]; then
              OVERALL=$(echo "$LAST_CHECKPOINT" | jq -r 'if any(.[]; .status == "FAIL") then "FAIL" else "PASS" end' 2>/dev/null || echo "FAIL")
              echo "{\"results\":$LAST_CHECKPOINT,\"overall\":\"$OVERALL\",\"note\":\"reconstructed from checkpoints — run may have been interrupted\"}" > results.json
            fi
          fi

      # ── Step 5b: T6 safety cleanup ────────────────────────────────────────
      # Runs even if Step 5's LLM crashes mid-T5. Removes any members that were
      # registered but never cleaned up. Idempotent — if T6 ran inside Step 5
      # this finds no members and exits PASS.
      - name: T6 — Member cleanup (safety net)
        if: always()
        shell: bash
        run: |
          # Rebuild mcp-runtime.json in case Step 5 never reached that point
          if [ "$RUNNER_OS" = "Windows" ]; then
            FLEET_BIN="$HOME/.apra-fleet/bin/apra-fleet.exe"
            FLEET_BIN_WIN=$(cygpath -w "$FLEET_BIN")
            FLEET_BIN_JSON=$(echo "$FLEET_BIN_WIN" | sed 's/\\/\\\\/g')
          else
            FLEET_BIN="$HOME/.apra-fleet/bin/apra-fleet"
            FLEET_BIN_JSON="$FLEET_BIN"
          fi
          printf '{"mcpServers":{"apra-fleet":{"type":"stdio","command":"%s","args":[]}}}\n' "$FLEET_BIN_JSON" > mcp-runtime.json

          PROVIDER='${{ steps.suite.outputs.pm_provider }}'
          CLEANUP_PROMPT='T6 Cleanup: Check fleet_status. Remove every registered member using remove_member. Verify fleet_status shows no members remain. Output EXACTLY this JSON and nothing else: {"test":"T6","status":"PASS","notes":"brief note"} — status PASS if all removed or none were registered, FAIL otherwise.'

          if [ "$PROVIDER" = "claude" ]; then
            claude \
              -p "$CLEANUP_PROMPT" \
              --mcp-config mcp-runtime.json \
              --output-format stream-json \
              --max-turns 15 \
              > t6-raw.txt 2>&1 || true
          else
            gemini \
              --output-format stream-json \
              --mcp-config mcp-runtime.json \
              -p "$CLEANUP_PROMPT" \
              > t6-raw.txt 2>&1 || true
          fi

          # Extract T6 result and write t6-result.json
          grep -E '"type":"result"' t6-raw.txt | tail -1 \
            | jq -r '.result // .text // ""' 2>/dev/null \
            | grep -oE '\{[^{}]*"T6"[^{}]*\}' | tail -1 > t6-result.json \
            || echo '{"test":"T6","status":"FAIL","notes":"safety cleanup did not produce a result"}' > t6-result.json
          echo "T6 safety result: $(cat t6-result.json)"

      # ── Step 5c: Collect PM fleet log ─────────────────────────────────────
      # Grab the fleet-<PID>.log that was active during this run. The stall
      # detector writes member session log paths into this file, making it the
      # anchor for post-mortem analysis. Member session logs are pulled by the
      # PM Claude during T6.0 and land in logs/ via receive_files.
      - name: Collect PM fleet log
        if: always()
        shell: bash
        run: |
          mkdir -p logs
          if [ "$RUNNER_OS" = "Windows" ]; then
            LOG_DIR=$(cygpath "$USERPROFILE")/.apra-fleet/data/logs
          else
            LOG_DIR="$HOME/.apra-fleet/data/logs"
          fi
          FLEET_LOG=$(ls -t "$LOG_DIR"/fleet-*.log 2>/dev/null | head -1)
          if [ -n "$FLEET_LOG" ]; then
            cp "$FLEET_LOG" logs/fleet-pm.log
            echo "Collected: $(basename $FLEET_LOG) ($(wc -c < "$FLEET_LOG") bytes)"
          else
            echo "No fleet log found in $LOG_DIR"
          fi

      # ── Step 6: Post summary ───────────────────────────────────────────────
      - name: Post job summary
        if: always()
        shell: bash
        run: |
          # Merge T6 safety result into results.json (overrides any T6 from Step 5)
          if [ -f t6-result.json ] && jq -e '.' t6-result.json > /dev/null 2>&1; then
            T6=$(cat t6-result.json)
            jq --argjson t6 "$T6" '.results = ((.results // []) | map(select(.test != "T6"))) + [$t6]' \
              results.json > results_merged.json 2>/dev/null && mv results_merged.json results.json || true
          fi

          echo "## Fleet E2E – Suite ${{ inputs.suite }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test | Status | Notes |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|-------|" >> $GITHUB_STEP_SUMMARY
          cat results.json | jq -r '.results[] | "| \(.test) | \(.status) | \(.notes) |"' >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "| error | FAIL | could not parse results |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          OVERALL=$(cat results.json | jq -r '.overall' 2>/dev/null || echo "FAIL")
          echo "**Overall: $OVERALL**" >> $GITHUB_STEP_SUMMARY

      # ── Step 7: Upload artifacts ───────────────────────────────────────────
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-${{ inputs.suite }}-${{ github.run_id }}
          path: |
            results.json
            results-meta.json
            raw-output.txt
            t6-raw.txt
            t6-result.json
            rendered-test-script.md
            mcp-runtime.json
            logs/
