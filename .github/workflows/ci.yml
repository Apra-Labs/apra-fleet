name: CI - Build & Test

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '.github/e2e/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '.github/e2e/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify vendor/apra-pm submodule pin is intact
        run: npm run verify:submodule

      - name: Build
        run: npm run build

      - name: Verify build output
        run: node -e "require('fs').existsSync('dist/index.js') || (console.error('Build output dist/index.js not found'), process.exit(1))"

      - name: Run tests
        run: npm test

      # apra-fleet-se's test/advanced-mock-runner-test.mjs shells out to a
      # real `bd` (beads) CLI binary via child_process -- it was never
      # available in CI because apra-fleet-3ns.3's step below is the first
      # time this package's tests have ever run here. Install it globally
      # (matches how every call site in this repo invokes `bd` as a bare
      # PATH command, not a project-local dependency). @beads/bd's
      # postinstall script downloads a platform-specific native binary; that
      # download can fail silently (npm still reports install success) --
      # --foreground-scripts surfaces postinstall output/failures instead of
      # swallowing them, and the version check below fails this step
      # immediately and clearly rather than deferring to a confusing crash
      # two steps later in the apra-fleet-se test suite.
      #
      # @beads/bd's postinstall.js has a hardcoded `if (!process.env.CI)
      # { install() } else { skip }` guard with no override flag/env var --
      # it assumes CI environments never need the bd binary, which is wrong
      # for this repo (apra-fleet-se's tests genuinely need a working `bd`).
      # GitHub Actions sets CI=true globally for every step; overriding it
      # to empty string for just this step (via the step-level `env:` block)
      # makes `!process.env.CI` true again, so postinstall actually runs its
      # download instead of silently no-op'ing.
      - name: Install bd CLI (required by apra-fleet-se tests)
        env:
          CI: ''
        run: |
          npm install -g @beads/bd --foreground-scripts
          bd --version

      # apra-fleet-3ns.3: apra-fleet-se, apra-fleet-workflow, and
      # apra-fleet-client each keep their tests in test/ (singular) as
      # *.test.mjs run via `node --test`, NOT vitest.config.ts's
      # 'packages/*/tests/**/*.test.ts' include (that pattern is real and
      # still needed -- it's what picks up packages/fleet-api-contract/tests/,
      # the one workspace package that DOES use vitest). Without this step,
      # `npm test` above never runs any of the three node:test suites, so a
      # broken apra-fleet-se build could ship undetected. --if-present skips
      # fleet-api-contract (already covered above, no "test" script of its
      # own) without failing.
      - name: Run workspace package test suites (node:test)
        run: npm test --workspaces --if-present

      # llms-full.txt is regenerated by the pre-commit hook when docs change.
      # This check fails if a dev bypassed the hook (--no-verify, missing hook
      # install). Only runs once -- on ubuntu-latest -- since the generator is
      # OS-agnostic.
      - name: Verify llms-full.txt is up to date
        if: matrix.os == 'ubuntu-latest'
        run: |
          node scripts/gen-llms-full.mjs
          if ! git diff --exit-code llms-full.txt; then
            echo ""
            echo "::error::llms-full.txt is stale."
            echo "Either re-run 'npm install' to install the pre-commit hook, or"
            echo "run 'node scripts/gen-llms-full.mjs' and commit the result."
            exit 1
          fi

  package:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Read version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            FULL_VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('version.json','utf-8')).version)")
            SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-6)
            FULL_VERSION="v${VERSION}_${SHORT_SHA}"
          fi
          echo "version=$FULL_VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $FULL_VERSION"

      - name: Create tarball
        run: |
          TARBALL_NAME="apra-fleet-${{ steps.version.outputs.version }}.tar.gz"
          tar czf "$TARBALL_NAME" \
            dist/ \
            skills/ \
            hooks/ \
            install.sh \
            version.json \
            package.json \
            package-lock.json
          echo "TARBALL_NAME=$TARBALL_NAME" >> "$GITHUB_ENV"
          echo "Created: $TARBALL_NAME"
          tar tzf "$TARBALL_NAME" | head -20

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apra-fleet-tarball
          path: ${{ env.TARBALL_NAME }}
          retention-days: 30

  build-binary:
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            binary: apra-fleet-installer-linux-x64
          - os: macos-latest
            binary: apra-fleet-installer-darwin-arm64
          - os: windows-latest
            binary: apra-fleet-installer-win-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Inject version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          node -e "const fs=require('fs');const v=JSON.parse(fs.readFileSync('version.json','utf-8'));v.version='${TAG}';fs.writeFileSync('version.json',JSON.stringify(v,null,2))"
          echo "Injected version: ${TAG}"

      - name: Install rcedit (Windows only)
        if: runner.os == 'Windows'
        run: npm install -g rcedit

      - name: Build SEA bundle
        run: node scripts/build-sea.mjs

      - name: Generate SEA config
        run: node scripts/gen-sea-config.mjs

      - name: Strip node.exe signature before SEA injection (Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $nodePath = (Get-Command node).Source
          Write-Host "Node path: $nodePath"
          $st = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "x64" } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          Write-Host "signtool: $st"
          & $st remove /s $nodePath

      - name: Package SEA binary
        run: node scripts/package-sea.mjs

      - name: Smoke test - version
        run: ./dist/${{ matrix.binary }} --version
        shell: bash

      - name: Smoke test - help
        run: ./dist/${{ matrix.binary }} --help
        shell: bash

      # apra-fleet-7pm.13: proves the workflow subsystem's "no system Node
      # required" claim -- run the launcher with Node stripped from PATH and
      # an isolated HOME, so the binary can only use its own embedded
      # runtime (self-heal extraction from apra-fleet-7pm.8) and any
      # accidental spawn('node') fails loudly. Scope: hello-world +
      # arg/error-surface only -- the auto-sprint launcher path is verified
      # separately by apra-fleet-7pm.15, which depends on this task.
      - name: Smoke test - workflow hello-world (no system Node)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          BIN="$(pwd)/dist/${{ matrix.binary }}"
          FAKEHOME="$(mktemp -d)"
          export HOME="$FAKEHOME"
          export APRA_FLEET_DATA_DIR="$FAKEHOME/data"
          export PATH="/usr/bin:/bin"
          ! command -v node
          OUT="$("$BIN" workflow hello-world one two)"
          echo "$OUT"
          echo "$OUT" | grep -qF '[OK] hello-world: args=one,two engine=resolved'
          test -f "$FAKEHOME/.apra-fleet/workflows/auto-sprint/auto-sprint/runner.js"
          test -f "$FAKEHOME/.apra-fleet/schemas/reviewer-output.json"
          # Persist FAKEHOME so the arg/error-surface step below runs against
          # this SAME already-self-healed HOME instead of a fresh/empty one --
          # step-local `export` does not survive to the next step, so it has
          # to be handed off explicitly via GITHUB_ENV.
          echo "FAKEHOME=$FAKEHOME" >> "$GITHUB_ENV"

      - name: Smoke test - workflow hello-world (no system Node) (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $FAKEHOME = Join-Path $env:RUNNER_TEMP "fakehome-$([guid]::NewGuid())"
          New-Item -ItemType Directory -Path $FAKEHOME -Force | Out-Null
          $env:HOME = $FAKEHOME
          $env:USERPROFILE = $FAKEHOME
          $env:APRA_FLEET_DATA_DIR = Join-Path $FAKEHOME "data"

          $filtered = ($env:PATH -split ';') | Where-Object { $_ -notmatch 'hostedtoolcache.*node' -and $_ -notmatch '[\\/]nodejs' }
          $env:PATH = ($filtered -join ';')
          if (Get-Command node -ErrorAction SilentlyContinue) {
            Write-Error "node is still resolvable on PATH after stripping"
            exit 1
          }

          $bin = Join-Path $PWD "dist\${{ matrix.binary }}"
          $out = & $bin workflow hello-world one two
          $out | Write-Host
          if (-not ($out -join "`n").Contains('[OK] hello-world: args=one,two engine=resolved')) {
            Write-Error "unexpected stdout from workflow hello-world"
            exit 1
          }
          if ($LASTEXITCODE -ne 0) {
            Write-Error "workflow hello-world exited $LASTEXITCODE"
            exit 1
          }

          $runnerPath = Join-Path $FAKEHOME ".apra-fleet\workflows\auto-sprint\auto-sprint\runner.js"
          $schemaPath = Join-Path $FAKEHOME ".apra-fleet\schemas\reviewer-output.json"
          if (-not (Test-Path $runnerPath)) {
            Write-Error "missing $runnerPath"
            exit 1
          }
          if (-not (Test-Path $schemaPath)) {
            Write-Error "missing $schemaPath"
            exit 1
          }

          # Persist FAKEHOME so the arg/error-surface step below runs against
          # this SAME already-self-healed HOME instead of a fresh/empty one --
          # step-local $env: assignments do not survive to the next step, so
          # it has to be handed off explicitly via GITHUB_ENV.
          Add-Content -Path $env:GITHUB_ENV -Value "FAKEHOME=$FAKEHOME"

      # `workflow --list` never self-heals by design (it only reports what's
      # already on disk) -- so this step MUST reuse the FAKEHOME that the
      # hello-world step above already self-healed via a real built-in
      # invocation. Reusing a fresh/different HOME here reproduces
      # "No workflows installed" even though self-heal is working correctly.
      - name: Smoke test - workflow arg/error surface
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set +e
          export HOME="$FAKEHOME"
          export APRA_FLEET_DATA_DIR="$FAKEHOME/data"
          OUT=$(./dist/${{ matrix.binary }} workflow does-not-exist 2>&1)
          CODE=$?
          set -e
          echo "$OUT"
          [ "$CODE" -eq 1 ]
          echo "$OUT" | grep -qi 'workflow "does-not-exist" not found in'
          echo "$OUT" | grep -q 'workflows'

          LIST_OUT=$(./dist/${{ matrix.binary }} workflow --list)
          echo "$LIST_OUT"
          echo "$LIST_OUT" | grep -q 'auto-sprint'
          echo "$LIST_OUT" | grep -q 'hello-world'

      - name: Smoke test - workflow arg/error surface (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:HOME = $env:FAKEHOME
          $env:USERPROFILE = $env:FAKEHOME
          $env:APRA_FLEET_DATA_DIR = Join-Path $env:FAKEHOME "data"

          $bin = Join-Path $PWD "dist\${{ matrix.binary }}"
          $out = & $bin workflow does-not-exist 2>&1
          $code = $LASTEXITCODE
          $out | Write-Host
          if ($code -ne 1) {
            Write-Error "expected exit code 1 from workflow does-not-exist, got $code"
            exit 1
          }
          $outText = ($out -join "`n")
          if ($outText -notmatch '(?i)workflow "does-not-exist" not found in') {
            Write-Error "missing not-found message in output"
            exit 1
          }
          if ($outText -notmatch 'workflows') {
            Write-Error "missing 'workflows' text in output"
            exit 1
          }

          $listOut = & $bin workflow --list
          $listOut | Write-Host
          $listText = ($listOut -join "`n")
          if ($listText -notmatch 'auto-sprint') {
            Write-Error "workflow --list output missing auto-sprint"
            exit 1
          }
          if ($listText -notmatch 'hello-world') {
            Write-Error "workflow --list output missing hello-world"
            exit 1
          }

      # apra-fleet-7pm.15: hello-world (above) only proves the launcher's OWN
      # import-trampoline mechanics. auto-sprint is the only built-in that
      # exercises the full runtime tree the launcher installs: the workflow
      # engine + apra-fleet-client + ajv + the vendored agent-role schemas
      # (packages/apra-fleet-se/auto-sprint/contracts.mjs). `--help` short-
      # circuits before any fleet-server dial (bin/cli.mjs's main() checks
      # values.help immediately after parseCliArgs()), so this needs no
      # server/network -- but contracts.mjs is a static import of cli.mjs's
      # own import chain (cli.mjs -> auto-sprint/runner.js -> contracts.mjs),
      # so by the time --help prints, module load has ALREADY (a) resolved
      # every bare-specifier import from ~/.apra-fleet/node_modules/ and (b)
      # ajv-compiled a validator for every role's output schema loaded from
      # ~/.apra-fleet/schemas/ (contracts.mjs's top-level `VALIDATORS =
      # ...ajv.compile(schema)`). A broken module resolution or an invalid
      # vendored schema would throw during that import, before --help ever
      # gets to print anything -- so a clean exit 0 with auto-sprint's own
      # usage text on stdout is proof both succeeded. The absent dev-fallback
      # warning proves APRA_FLEET_SE_SCHEMAS_DIR (set by the launcher's
      # applyEnvDefaults) pointed contracts.mjs's resolveSchemasDir() at the
      # installed ~/.apra-fleet/schemas/ tree rather than the (nonexistent in
      # this packaged-binary context) monorepo vendor/apra-pm/ submodule.
      - name: Smoke test - workflow auto-sprint --help (no system Node)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          BIN="$(pwd)/dist/${{ matrix.binary }}"
          FAKEHOME="$(mktemp -d)"
          export HOME="$FAKEHOME"
          export APRA_FLEET_DATA_DIR="$FAKEHOME/data"
          export PATH="/usr/bin:/bin"
          ! command -v node
          OUT="$("$BIN" workflow auto-sprint --help 2>stderr.log)"
          ERR="$(cat stderr.log)"
          echo "$OUT"
          echo "--- stderr ---"
          echo "$ERR"
          echo "$OUT" | grep -qF 'Usage: fleet-se sprint [options]'
          echo "$OUT" | grep -qF -- '--role-map <json|@file>'
          ! echo "$ERR" | grep -qF '[contracts] Using the live vendor/apra-pm submodule'
          ! echo "$ERR" | grep -qi 'cannot find module'
          ! echo "$ERR" | grep -qi 'ERR_MODULE_NOT_FOUND'
          test -f "$FAKEHOME/.apra-fleet/workflows/auto-sprint/bin/cli.mjs"

      - name: Smoke test - workflow auto-sprint --help (no system Node) (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $FAKEHOME = Join-Path $env:RUNNER_TEMP "fakehome-as-$([guid]::NewGuid())"
          New-Item -ItemType Directory -Path $FAKEHOME -Force | Out-Null
          $env:HOME = $FAKEHOME
          $env:USERPROFILE = $FAKEHOME
          $env:APRA_FLEET_DATA_DIR = Join-Path $FAKEHOME "data"

          $filtered = ($env:PATH -split ';') | Where-Object { $_ -notmatch 'hostedtoolcache.*node' -and $_ -notmatch '[\\/]nodejs' }
          $env:PATH = ($filtered -join ';')
          if (Get-Command node -ErrorAction SilentlyContinue) {
            Write-Error "node is still resolvable on PATH after stripping"
            exit 1
          }

          $bin = Join-Path $PWD "dist\${{ matrix.binary }}"
          $out = & $bin workflow auto-sprint --help 2>"$env:RUNNER_TEMP\as-stderr.log"
          $code = $LASTEXITCODE
          $errText = Get-Content "$env:RUNNER_TEMP\as-stderr.log" -Raw -ErrorAction SilentlyContinue
          $out | Write-Host
          Write-Host "--- stderr ---"
          Write-Host $errText
          if ($code -ne 0) {
            Write-Error "workflow auto-sprint --help exited $code"
            exit 1
          }
          $outText = ($out -join "`n")
          if (-not $outText.Contains('Usage: fleet-se sprint [options]')) {
            Write-Error "unexpected stdout from workflow auto-sprint --help"
            exit 1
          }
          if (-not $outText.Contains('--role-map <json|@file>')) {
            Write-Error "unexpected stdout from workflow auto-sprint --help (missing --role-map)"
            exit 1
          }
          if ($errText -and $errText.Contains('[contracts] Using the live vendor/apra-pm submodule')) {
            Write-Error "schema dev-fallback warning present -- APRA_FLEET_SE_SCHEMAS_DIR did not resolve the installed schemas tree"
            exit 1
          }
          if ($errText -and ($errText -match '(?i)cannot find module|ERR_MODULE_NOT_FOUND')) {
            Write-Error "module-resolution error detected in stderr"
            exit 1
          }

          $cliPath = Join-Path $FAKEHOME ".apra-fleet\workflows\auto-sprint\bin\cli.mjs"
          if (-not (Test-Path $cliPath)) {
            Write-Error "missing $cliPath"
            exit 1
          }

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: dist/${{ matrix.binary }}
          retention-days: 30

  sign-windows:
    environment: signing
    needs: build-binary
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: apra-fleet-installer-win-x64.exe
          path: to-sign

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign exe
        uses: azure/trusted-signing-action@v0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE }}
          files-folder: to-sign
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload signed binary
        uses: actions/upload-artifact@v4
        with:
          name: apra-fleet-installer-win-x64.exe
          path: to-sign/apra-fleet-installer-win-x64.exe
          retention-days: 30
          overwrite: true

  release:
    needs: [package, build-binary, sign-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Read version
        id: version
        run: |
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('version.json','utf-8')).version)")
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-6)
          FULL_VERSION="v${VERSION}_${SHORT_SHA}"
          echo "version=$FULL_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release tarball
        run: |
          TARBALL_NAME="apra-fleet-${{ steps.version.outputs.version }}.tar.gz"
          tar czf "$TARBALL_NAME" \
            dist/ \
            skills/ \
            hooks/ \
            install.sh \
            version.json \
            package.json \
            package-lock.json
          echo "TARBALL_NAME=$TARBALL_NAME" >> "$GITHUB_ENV"

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-binaries
          pattern: apra-fleet-*
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.TARBALL_NAME }}
            release-binaries/apra-fleet-installer-linux-x64
            release-binaries/apra-fleet-installer-darwin-arm64
            release-binaries/apra-fleet-installer-win-x64.exe
          generate_release_notes: true

  npm-publish:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: npm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Inject version from tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf-8'));
            const ver = JSON.parse(fs.readFileSync('version.json','utf-8'));
            pkg.version = '${TAG}';
            ver.version = '${TAG}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            fs.writeFileSync('version.json', JSON.stringify(ver, null, 2) + '\n');
          "
          echo "Injected version: ${TAG}"

      - name: Version lockstep guard
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG_VER=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json','utf-8')).version)")
          VER_VER=$(node -e "console.log(JSON.parse(require('fs').readFileSync('version.json','utf-8')).version)")
          echo "Tag=$TAG  package.json=$PKG_VER  version.json=$VER_VER"
          if [ "$TAG" != "$PKG_VER" ] || [ "$TAG" != "$VER_VER" ]; then
            echo "::error::Version mismatch! tag=$TAG package.json=$PKG_VER version.json=$VER_VER"
            exit 1
          fi

      - name: Build
        # Same sequence as prepublishOnly (which npm only fires automatically
        # on `npm publish`, not `npm pack`) -- run it explicitly here so this
        # job's dry-run pack verification sees the same artifacts a real
        # publish would produce: dist/agents/schemas (scripts/vendor-pm.mjs),
        # apra-fleet-se's package-local schema copy (apra-fleet-bun),
        # dist/index.js (tsc), and dist/auto-sprint.mjs + dist/auto-sprint-runner.mjs
        # (scripts/bundle-se.mjs, apra-fleet-3ns.2).
        run: npm run prepublishOnly

      - name: Verify shebang
        run: |
          head -1 dist/index.js | grep -q '^#!/usr/bin/env node'
          head -1 dist/auto-sprint.mjs | grep -q '^#!/usr/bin/env node'

      - name: Dry-run pack verification
        run: |
          npm pack --dry-run 2>&1 | tee pack-output.txt
          grep -q 'dist/index.js' pack-output.txt
          grep -q 'version.json' pack-output.txt
          grep -q 'hooks/hooks-config.json' pack-output.txt
          grep -q 'skills/pm/' pack-output.txt || grep -q 'skills/fleet/' pack-output.txt
          grep -q 'dist/auto-sprint.mjs' pack-output.txt
          grep -q 'dist/auto-sprint-runner.mjs' pack-output.txt
          grep -q 'dist/agents/schemas/' pack-output.txt
          echo "Pack verification passed"

      - name: Clean-pack guard -- reject stale SEA build artifacts
        run: |
          npm pack --dry-run 2>&1 | tee pack-check.txt
          if grep -qE '\.(exe)$|sea-prep\.blob|sea-bundle\.cjs' pack-check.txt; then
            echo "::error::Pack contains stale SEA build artifacts (exe/sea-prep.blob/sea-bundle.cjs). Clean dist/ and retry."
            grep -E '\.(exe)$|sea-prep\.blob|sea-bundle\.cjs' pack-check.txt
            exit 1
          fi
          PACK_SIZE=$(npm pack --dry-run 2>&1 | grep 'unpacked size' | grep -oE '[0-9]+(\.[0-9]+)? [kMG]B' | head -1)
          echo "Unpacked size: $PACK_SIZE"
          PACK_BYTES=$(npm pack --dry-run 2>&1 | grep 'unpacked size' | grep -oE '[0-9]+' | head -1)
          if [ -n "$PACK_BYTES" ] && [ "$PACK_BYTES" -gt 10000000 ]; then
            echo "::error::Pack unpacked size exceeds 10MB ($PACK_SIZE). Check for stale SEA artifacts in dist/."
            exit 1
          fi
          echo "Clean-pack guard passed"

      - name: Pack + install into a clean temp prefix (auto-sprint smoke test)
        # apra-fleet-3ns.2(f) / apra-fleet-3ns.2.2: proves a real packed
        # tarball, extracted with no monorepo/vendor/ ancestor and no
        # node_modules present, exposes a working `auto-sprint` bin whose
        # schema resolution finds the co-packaged dist/agents/schemas/ --
        # not the apra-fleet-bun.1 monorepo dev-fallback (which would warn)
        # or the last-resort hand-written literals.
        run: |
          TMP_INSTALL=$(mktemp -d)
          npm pack --pack-destination "$TMP_INSTALL"
          TARBALL=$(ls "$TMP_INSTALL"/apralabs-apra-fleet-*.tgz)
          tar -xzf "$TARBALL" -C "$TMP_INSTALL"
          PKG_DIR="$TMP_INSTALL/package"

          test -d "$PKG_DIR/dist/agents/schemas" || { echo "::error::dist/agents/schemas/ missing from the packed tarball."; exit 1; }
          SCHEMA_COUNT=$(ls "$PKG_DIR/dist/agents/schemas/"*.json 2>/dev/null | wc -l)
          if [ "$SCHEMA_COUNT" -eq 0 ]; then
            echo "::error::dist/agents/schemas/ is present but contains no *.json files."
            exit 1
          fi

          node "$PKG_DIR/dist/auto-sprint.mjs" --help > "$TMP_INSTALL/se-help-stdout.txt" 2> "$TMP_INSTALL/se-help-stderr.txt"
          grep -q 'Usage: fleet-se sprint' "$TMP_INSTALL/se-help-stdout.txt" || {
            echo "::error::auto-sprint --help did not produce the expected usage text."
            cat "$TMP_INSTALL/se-help-stdout.txt"
            exit 1
          }
          if grep -q 'Using the live vendor/apra-pm submodule' "$TMP_INSTALL/se-help-stderr.txt"; then
            echo "::error::dist/auto-sprint.mjs fell back to the monorepo vendor/apra-pm dev path instead of resolving the packaged dist/agents/schemas/ -- the tarball's schema bundling is broken."
            cat "$TMP_INSTALL/se-help-stderr.txt"
            exit 1
          fi
          echo "Clean install smoke test passed: auto-sprint --help works with no node_modules, schemas resolved from dist/agents/schemas (no dev-fallback warning)"

          # apra-fleet-7pm.12: the `--help` check above exits before
          # engine.executeFile() ever runs, so it never exercised
          # dist/auto-sprint-runner.mjs's own import graph ('./contracts.mjs',
          # './errors.mjs', '@apralabs/apra-fleet-workflow' [+ its '/viewer/
          # html-utils' subpath], '@apralabs/apra-fleet-client', 'ajv') --
          # only dist/auto-sprint.mjs's esbuild-inlined imports. Reuse this
          # same clean-prefix tarball extraction and drive
          # engine.executeFile() directly against the runner script, so a
          # broken runtime import graph fails CI instead of shipping
          # silently.
          node "$GITHUB_WORKSPACE/scripts/smoke-test-runner-import.mjs" "$PKG_DIR"
          echo "Runner-load smoke test passed"

      - name: Check if version already published
        id: check-published
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          if npm view @apralabs/apra-fleet@${TAG} version 2>/dev/null; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Version ${TAG} is already published to npm -- skipping publish"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.check-published.outputs.already_published == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
