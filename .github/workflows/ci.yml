name: CI - Build & Test

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output
        run: node -e "require('fs').existsSync('dist/index.js') || (console.error('Build output dist/index.js not found'), process.exit(1))"

      - name: Run tests
        run: npm test

  package:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Read version
        id: version
        run: |
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('version.json','utf-8')).version)")
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-6)
          FULL_VERSION="v${VERSION}_${SHORT_SHA}"
          echo "version=$FULL_VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $FULL_VERSION"

      - name: Create tarball
        run: |
          TARBALL_NAME="apra-fleet-${{ steps.version.outputs.version }}.tar.gz"
          tar czf "$TARBALL_NAME" \
            dist/ \
            skills/ \
            hooks/ \
            install.sh \
            version.json \
            package.json \
            package-lock.json
          echo "TARBALL_NAME=$TARBALL_NAME" >> "$GITHUB_ENV"
          echo "Created: $TARBALL_NAME"
          tar tzf "$TARBALL_NAME" | head -20

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apra-fleet-tarball
          path: ${{ env.TARBALL_NAME }}
          retention-days: 30

  release:
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Read version
        id: version
        run: |
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('version.json','utf-8')).version)")
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-6)
          FULL_VERSION="v${VERSION}_${SHORT_SHA}"
          echo "version=$FULL_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release tarball
        run: |
          TARBALL_NAME="apra-fleet-${{ steps.version.outputs.version }}.tar.gz"
          tar czf "$TARBALL_NAME" \
            dist/ \
            skills/ \
            hooks/ \
            install.sh \
            version.json \
            package.json \
            package-lock.json
          echo "TARBALL_NAME=$TARBALL_NAME" >> "$GITHUB_ENV"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.TARBALL_NAME }}
          generate_release_notes: true
