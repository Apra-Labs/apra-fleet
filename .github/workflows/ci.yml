name: CI - Build & Test

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output
        run: node -e "require('fs').existsSync('dist/index.js') || (console.error('Build output dist/index.js not found'), process.exit(1))"

      - name: Run tests
        run: npm test

  package:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Read version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            FULL_VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('version.json','utf-8')).version)")
            SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-6)
            FULL_VERSION="v${VERSION}_${SHORT_SHA}"
          fi
          echo "version=$FULL_VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $FULL_VERSION"

      - name: Create tarball
        run: |
          TARBALL_NAME="apra-fleet-${{ steps.version.outputs.version }}.tar.gz"
          tar czf "$TARBALL_NAME" \
            dist/ \
            skills/ \
            hooks/ \
            install.sh \
            version.json \
            package.json \
            package-lock.json
          echo "TARBALL_NAME=$TARBALL_NAME" >> "$GITHUB_ENV"
          echo "Created: $TARBALL_NAME"
          tar tzf "$TARBALL_NAME" | head -20

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apra-fleet-tarball
          path: ${{ env.TARBALL_NAME }}
          retention-days: 30

  build-binary:
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            binary: apra-fleet-linux-x64
          - os: macos-latest
            binary: apra-fleet-darwin-arm64
          - os: windows-latest
            binary: apra-fleet-win-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Inject version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          node -e "const fs=require('fs');const v=JSON.parse(fs.readFileSync('version.json','utf-8'));v.version='${TAG}';fs.writeFileSync('version.json',JSON.stringify(v,null,2))"
          echo "Injected version: ${TAG}"

      - name: Install rcedit (Windows only)
        if: runner.os == 'Windows'
        run: npm install -g rcedit

      - name: Build SEA bundle
        run: node scripts/build-sea.mjs

      - name: Generate SEA config
        run: node scripts/gen-sea-config.mjs

      - name: Strip node.exe signature before SEA injection (Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $nodePath = (Get-Command node).Source
          Write-Host "Node path: $nodePath"
          $st = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "x64" } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          Write-Host "signtool: $st"
          & $st remove /s $nodePath

      - name: Package SEA binary
        run: node scripts/package-sea.mjs

      - name: Smoke test - version
        run: ./dist/${{ matrix.binary }} --version
        shell: bash

      - name: Smoke test - help
        run: ./dist/${{ matrix.binary }} --help
        shell: bash

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: dist/${{ matrix.binary }}
          retention-days: 30

  sign-windows:
    environment: signing
    needs: build-binary
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: apra-fleet-win-x64.exe
          path: to-sign

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign exe
        uses: azure/trusted-signing-action@v0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE }}
          files-folder: to-sign
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload signed binary
        uses: actions/upload-artifact@v4
        with:
          name: apra-fleet-win-x64.exe
          path: to-sign/apra-fleet-win-x64.exe
          retention-days: 30
          overwrite: true

  update-llms-full:
    needs: build-and-test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate llms-full.txt
        run: node scripts/gen-llms-full.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add llms-full.txt
          git diff --cached --quiet || git commit -m "chore: regenerate llms-full.txt [skip ci]"
          git push origin HEAD:${{ github.head_ref }}

  release:
    needs: [package, build-binary, sign-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Read version
        id: version
        run: |
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('version.json','utf-8')).version)")
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-6)
          FULL_VERSION="v${VERSION}_${SHORT_SHA}"
          echo "version=$FULL_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release tarball
        run: |
          TARBALL_NAME="apra-fleet-${{ steps.version.outputs.version }}.tar.gz"
          tar czf "$TARBALL_NAME" \
            dist/ \
            skills/ \
            hooks/ \
            install.sh \
            version.json \
            package.json \
            package-lock.json
          echo "TARBALL_NAME=$TARBALL_NAME" >> "$GITHUB_ENV"

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-binaries
          pattern: apra-fleet-*
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.TARBALL_NAME }}
            release-binaries/apra-fleet-linux-x64
            release-binaries/apra-fleet-darwin-arm64
            release-binaries/apra-fleet-win-x64.exe
          generate_release_notes: true

      - name: Bump version.json via PR
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          NEXT=$(node -e "const [ma,mi,pa]='${TAG}'.split('.');console.log([ma,mi,parseInt(pa)+1].join('.'))")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -b "chore/bump-version-${NEXT}" origin/main
          node -e "const fs=require('fs');const v=JSON.parse(fs.readFileSync('version.json','utf-8'));v.version='${NEXT}';fs.writeFileSync('version.json',JSON.stringify(v,null,2)+'\n')"
          git add version.json
          git commit -m "chore: bump version to ${NEXT}"
          git push origin "chore/bump-version-${NEXT}"
          gh pr create \
            --title "chore: bump version to ${NEXT}" \
            --body "Automated post-release version bump v${TAG} → v${NEXT}." \
            --base main \
            --head "chore/bump-version-${NEXT}"
