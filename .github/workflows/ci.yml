name: CI - Build & Test

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output
        run: node -e "require('fs').existsSync('dist/index.js') || (console.error('Build output dist/index.js not found'), process.exit(1))"

      - name: Run tests
        run: npm test

  package:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Read version
        id: version
        run: |
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('version.json','utf-8')).version)")
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-6)
          FULL_VERSION="v${VERSION}_${SHORT_SHA}"
          echo "version=$FULL_VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $FULL_VERSION"

      - name: Create tarball
        run: |
          TARBALL_NAME="apra-fleet-${{ steps.version.outputs.version }}.tar.gz"
          tar czf "$TARBALL_NAME" \
            dist/ \
            skills/ \
            hooks/ \
            install.sh \
            version.json \
            package.json \
            package-lock.json
          echo "TARBALL_NAME=$TARBALL_NAME" >> "$GITHUB_ENV"
          echo "Created: $TARBALL_NAME"
          tar tzf "$TARBALL_NAME" | head -20

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apra-fleet-tarball
          path: ${{ env.TARBALL_NAME }}
          retention-days: 30

  build-binary:
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            binary: apra-fleet-linux-x64
          - os: macos-latest
            binary: apra-fleet-darwin-arm64
          - os: windows-latest
            binary: apra-fleet-win-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install rcedit (Windows only)
        if: runner.os == 'Windows'
        run: npm install -g rcedit

      - name: Build SEA bundle
        run: node scripts/build-sea.mjs

      - name: Generate SEA config
        run: node scripts/gen-sea-config.mjs

      - name: Package SEA binary
        run: node scripts/package-sea.mjs

      - name: Smoke test - version
        run: ./dist/${{ matrix.binary }} --version
        shell: bash

      - name: Smoke test - help
        run: ./dist/${{ matrix.binary }} --help
        shell: bash

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: dist/${{ matrix.binary }}
          retention-days: 30

  release:
    needs: [package, build-binary]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Read version
        id: version
        run: |
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('version.json','utf-8')).version)")
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-6)
          FULL_VERSION="v${VERSION}_${SHORT_SHA}"
          echo "version=$FULL_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release tarball
        run: |
          TARBALL_NAME="apra-fleet-${{ steps.version.outputs.version }}.tar.gz"
          tar czf "$TARBALL_NAME" \
            dist/ \
            skills/ \
            hooks/ \
            install.sh \
            version.json \
            package.json \
            package-lock.json
          echo "TARBALL_NAME=$TARBALL_NAME" >> "$GITHUB_ENV"

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-binaries
          pattern: apra-fleet-*
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.TARBALL_NAME }}
            release-binaries/apra-fleet-linux-x64
            release-binaries/apra-fleet-darwin-arm64
            release-binaries/apra-fleet-win-x64.exe
          generate_release_notes: true
