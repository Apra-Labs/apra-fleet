<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apra Fleet -- KB Git Flow</title>
<style>
  body { margin: 0; background: #0f1117; display: flex; flex-direction: column; align-items: center; padding: 32px 16px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  h1 { color: #e2e8f0; font-size: 20px; font-weight: 600; margin: 0 0 6px; letter-spacing: 0.02em; }
  p.sub { color: #64748b; font-size: 13px; margin: 0 0 28px; }
</style>
</head>
<body>
<h1>Knowledge Bible -- Automated KB Flow</h1>
<p class="sub">Sprint cycle builds the project bible committed to git. No human in the loop.</p>

<svg xmlns="http://www.w3.org/2000/svg" width="960" height="820" viewBox="0 0 960 820">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f97316"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#60a5fa"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- Lane backgrounds -->
  <rect x="20" y="60" width="420" height="700" rx="10" fill="#161b26" stroke="#1e2736" stroke-width="1"/>
  <rect x="520" y="60" width="420" height="700" rx="10" fill="#0d1f17" stroke="#1a3028" stroke-width="1"/>

  <!-- Lane headers -->
  <text x="230" y="90" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600" letter-spacing="0.08em">SPRINT EXECUTION</text>
  <text x="730" y="90" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="600" letter-spacing="0.08em">KB BIBLE (GIT)</text>

  <!-- ===================== SPRINT LANE ===================== -->

  <!-- 1. Doer Session -->
  <rect x="55" y="110" width="330" height="100" rx="8" fill="#1c1a0e" stroke="#f97316" stroke-width="1.5"/>
  <text x="220" y="133" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="700" letter-spacing="0.06em">DOER SESSION</text>
  <text x="220" y="152" text-anchor="middle" fill="#94a3b8" font-size="11">Executes tasks, navigates codebase</text>
  <text x="220" y="168" text-anchor="middle" fill="#94a3b8" font-size="11">Discovers symbols, patterns, constraints</text>
  <text x="220" y="188" text-anchor="middle" fill="#fbbf24" font-size="11" font-style="italic">End of session: kb_harvest()</text>

  <!-- Arrow doer -> reviewer -->
  <line x1="220" y1="210" x2="220" y2="246" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="228" y="232" fill="#475569" font-size="10">harvest output</text>

  <!-- 2. Reviewer Session -->
  <rect x="55" y="250" width="330" height="90" rx="8" fill="#0e1521" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="220" y="273" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700" letter-spacing="0.06em">REVIEWER SESSION</text>
  <text x="220" y="292" text-anchor="middle" fill="#94a3b8" font-size="11">Reads diff + PLAN.md + progress.json</text>
  <text x="220" y="310" text-anchor="middle" fill="#94a3b8" font-size="11">Runs build + tests independently</text>
  <text x="220" y="328" text-anchor="middle" fill="#60a5fa" font-size="11" font-style="italic">Writes feedback.md verdict</text>

  <!-- Verdict branch -->
  <line x1="220" y1="340" x2="220" y2="376" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Verdict diamond -->
  <polygon points="220,380 280,408 220,436 160,408" fill="#1a1a2e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="220" y="404" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">VERDICT?</text>
  <text x="220" y="418" text-anchor="middle" fill="#c4b5fd" font-size="9">feedback.md</text>

  <!-- APPROVED label -->
  <text x="150" y="404" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600">APPROVED</text>
  <!-- CHANGES NEEDED label -->
  <text x="294" y="404" text-anchor="middle" fill="#f87171" font-size="10" font-weight="600">CHANGES</text>
  <text x="294" y="416" text-anchor="middle" fill="#f87171" font-size="10" font-weight="600">NEEDED</text>

  <!-- Arrow CHANGES NEEDED -> doer re-dispatch (right side loop) -->
  <path d="M280,408 Q410,408 410,320 Q410,230 385,210" fill="none" stroke="#f87171" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="418" y="315" fill="#f87171" font-size="9" text-anchor="middle">re-dispatch</text>
  <text x="418" y="327" fill="#f87171" font-size="9" text-anchor="middle">doer</text>

  <!-- Arrow APPROVED -> KB Agent -->
  <line x1="160" y1="408" x2="110" y2="408" stroke="#64748b" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="110" y1="408" x2="110" y2="476" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 3. KB Agent -->
  <rect x="55" y="480" width="330" height="110" rx="8" fill="#180f2e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="220" y="503" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700" letter-spacing="0.06em">KB AGENT</text>
  <text x="220" y="522" text-anchor="middle" fill="#94a3b8" font-size="11">Reads: harvest output + reviewer verdict</text>
  <rect x="70" y="530" width="140" height="22" rx="4" fill="#0f2019" stroke="#22c55e" stroke-width="1"/>
  <text x="140" y="545" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">APPROVED -> CONFIRMED</text>
  <rect x="230" y="530" width="140" height="22" rx="4" fill="#1a0f0f" stroke="#f87171" stroke-width="1"/>
  <text x="300" y="545" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">CHANGES -> INFERRED</text>
  <text x="220" y="572" text-anchor="middle" fill="#94a3b8" font-size="11">Filters: only CONFIRMED written to bible</text>
  <text x="220" y="588" text-anchor="middle" fill="#c4b5fd" font-size="11" font-style="italic">Commits .fleet/kb-canonical.json</text>

  <!-- ===================== KB BIBLE LANE ===================== -->

  <!-- git commit box -->
  <rect x="555" y="480" width="350" height="70" rx="8" fill="#0a1a0e" stroke="#22c55e" stroke-width="1.5"/>
  <text x="730" y="503" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="700" letter-spacing="0.06em">.fleet/kb-canonical.json</text>
  <text x="730" y="522" text-anchor="middle" fill="#94a3b8" font-size="11">CONFIRMED entries appended / updated</text>
  <text x="730" y="540" text-anchor="middle" fill="#4ade80" font-size="11" font-style="italic">git commit + push to branch</text>

  <!-- What's in the file - sample entry -->
  <rect x="555" y="568" width="350" height="108" rx="8" fill="#0c1a14" stroke="#1a3a28" stroke-width="1"/>
  <text x="572" y="586" fill="#4ade80" font-size="10" font-weight="600">kb-canonical.json (sample entry)</text>
  <text x="572" y="602" fill="#475569" font-size="10">&#123;</text>
  <text x="582" y="617" fill="#94a3b8" font-size="10">"symbol": "EnableAMQPTransportMode",</text>
  <text x="582" y="631" fill="#94a3b8" font-size="10">"module": "SiteManagerCore",</text>
  <text x="582" y="645" fill="#94a3b8" font-size="10">"confidence": "CONFIRMED",</text>
  <text x="582" y="659" fill="#94a3b8" font-size="10">"summary": "Authority DTO pattern -- add bool?</text>
  <text x="592" y="671" fill="#94a3b8" font-size="10">property, follows ServiceBus push model",</text>
  <text x="472" y="671" fill="#94a3b8" font-size="10"></text>
  <text x="582" y="669" fill="#94a3b8" font-size="10"></text>
  <text x="572" y="683" fill="#475569" font-size="10">&#125;</text>

  <!-- Next sprint box -->
  <rect x="555" y="696" width="350" height="50" rx="8" fill="#1a1a2e" stroke="#818cf8" stroke-width="1.5"/>
  <text x="730" y="718" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="700">NEXT SPRINT -- ANY DEVELOPER</text>
  <text x="730" y="736" text-anchor="middle" fill="#94a3b8" font-size="11">kb_session_prime reads bible -> pre-loaded context</text>

  <!-- ===================== ARROWS BETWEEN LANES ===================== -->

  <!-- KB Agent -> kb-canonical.json -->
  <line x1="385" y1="530" x2="553" y2="515" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="468" y="512" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600">CONFIRMED only</text>

  <!-- kb-canonical.json -> next sprint -->
  <line x1="730" y1="676" x2="730" y2="694" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Next sprint loops back to doer (curved arrow across lanes) -->
  <path d="M555,721 Q480,721 480,160 Q480,110 387,135" fill="none" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-purple)"/>
  <text x="492" y="440" fill="#818cf8" font-size="10" text-anchor="middle">Sprint N+1</text>
  <text x="492" y="452" fill="#818cf8" font-size="10" text-anchor="middle">pre-loaded</text>

  <!-- ===================== BRANCH MERGE NOTE ===================== -->
  <rect x="555" y="110" width="350" height="130" rx="8" fill="#111827" stroke="#374151" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="730" y="133" text-anchor="middle" fill="#9ca3af" font-size="11" font-weight="700" letter-spacing="0.05em">BRANCH SCOPING</text>
  <line x1="570" y1="140" x2="890" y2="140" stroke="#374151" stroke-width="1"/>

  <circle cx="580" cy="162" r="4" fill="#f97316"/>
  <text x="592" y="166" fill="#94a3b8" font-size="10">feat/enable-h265  ->  branch bible</text>

  <circle cx="580" cy="184" r="4" fill="#60a5fa"/>
  <text x="592" y="188" fill="#94a3b8" font-size="10">feat/ip-change    ->  branch bible</text>

  <circle cx="580" cy="206" r="4" fill="#22c55e"/>
  <text x="592" y="210" fill="#94a3b8" font-size="10">main              ->  canonical bible</text>

  <text x="570" y="230" fill="#6b7280" font-size="10">PR merge carries branch bible into main.</text>
  <text x="570" y="244" fill="#6b7280" font-size="10">main bible = accumulated project truth.</text>

  <!-- Legend -->
  <rect x="55" y="680" width="330" height="70" rx="6" fill="#111827" stroke="#1e2736" stroke-width="1"/>
  <text x="220" y="700" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600" letter-spacing="0.06em">CONFIDENCE LEVELS</text>
  <rect x="70" y="708" width="10" height="10" rx="2" fill="#fbbf24"/>
  <text x="86" y="718" fill="#94a3b8" font-size="10">UNVERIFIED  raw capture, not shared</text>
  <rect x="70" y="724" width="10" height="10" rx="2" fill="#60a5fa"/>
  <text x="86" y="734" fill="#94a3b8" font-size="10">INFERRED  changes needed path, local only</text>
  <rect x="70" y="740" width="10" height="10" rx="2" fill="#22c55e"/>
  <text x="86" y="750" fill="#94a3b8" font-size="10">CONFIRMED  approved path, committed to bible</text>
</svg>

</body>
</html>
